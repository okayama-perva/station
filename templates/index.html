<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>駅到達圏検索</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f6f7fb;
    --card: #ffffff;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #dbe2ea;
    --brand: #0f766e;
    --brand-soft: #e3f5f2;
    --warm: #fff1db;
  }
  body { font-family: "Segoe UI", "Hiragino Sans", sans-serif; background: linear-gradient(180deg, #eef6f4 0%, var(--bg) 100%); color: var(--ink); }
  .container { max-width: 1440px; margin: 0 auto; padding: 24px 18px 40px; }
  h1 { text-align: center; margin: 18px 0 22px; font-size: 1.8rem; letter-spacing: 0.03em; }
  .form-card, .result-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 16px 40px rgba(15, 23, 42, 0.06);
  }
  .form-card { padding: 22px; margin-bottom: 18px; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
  .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 150px; }
  .form-group label { font-size: 0.85rem; font-weight: 700; color: var(--muted); }
  .input-wrap { position: relative; flex: 1.4; min-width: 180px; }
  input, select {
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    font-size: 0.98rem;
    background: #fff;
  }
  input:focus, select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12); }
  button {
    padding: 12px 22px;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { filter: brightness(0.95); }
  #suggestions {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 10;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
  }
  #suggestions div { padding: 10px 12px; cursor: pointer; }
  #suggestions div:hover { background: #f2fbfa; }
  .loading, .info, .error { text-align: center; padding: 36px 0; color: var(--muted); }
  .error { color: #b91c1c; }
  .result-card { padding: 18px; }
  .results-shell { display: grid; grid-template-columns: minmax(340px, 0.95fr) minmax(520px, 1.45fr); gap: 18px; align-items: start; }
  .result-main { min-width: 0; }
  .map-panel {
    border: 1px solid var(--line);
    border-radius: 16px;
    background: #fcfefe;
    overflow: hidden;
    position: sticky;
    top: 18px;
  }
  .map-panel h3 { padding: 12px 14px; font-size: 0.95rem; border-bottom: 1px solid var(--line); background: #f8fbfb; }
  #map { height: 680px; width: 100%; }
  .map-note { padding: 10px 14px; color: var(--muted); font-size: 0.84rem; border-top: 1px solid var(--line); }
  .map-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 14px;
    padding: 10px 14px 0;
    color: var(--ink);
    font-size: 0.82rem;
  }
  .legend-item { display: inline-flex; align-items: center; gap: 7px; }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    border: 2px solid #0f172a;
    display: inline-block;
  }
  .map-pin-node,
  .map-pin-target {
    border-radius: 999px;
    border: 3px solid #0f172a;
    box-shadow: 0 4px 10px rgba(15, 23, 42, 0.28);
  }
  .map-pin-node {
    width: 18px;
    height: 18px;
  }
  .map-pin-target {
    width: 24px;
    height: 24px;
    border-color: #134e4a;
    background: #14b8a6;
    box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.2);
  }
  .result-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--brand-soft);
  }
  .result-header h2 { font-size: 1.05rem; line-height: 1.5; }
  .count {
    background: var(--brand);
    color: #fff;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .meta-note { font-size: 0.9rem; color: var(--muted); margin-bottom: 10px; }
  .group-card { border: 1px solid var(--line); border-radius: 16px; margin-top: 14px; overflow: hidden; }
  .group-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: #f8fbfb;
    border-bottom: 1px solid var(--line);
  }
  .group-title { display: flex; gap: 8px; align-items: center; font-weight: 700; flex-wrap: wrap; }
  .service-badge { background: var(--brand-soft); color: var(--brand); padding: 3px 9px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #fbfcfd; text-align: left; padding: 10px 12px; font-size: 0.84rem; color: var(--muted); }
  td { padding: 10px 12px; border-top: 1px solid #eef2f7; font-size: 0.92rem; vertical-align: top; }
  tr:hover td { background: #fcfefe; }
  .time-badge { background: #e8f7ef; color: #166534; padding: 2px 8px; border-radius: 8px; font-weight: 700; }
  .transfer-badge { background: var(--warm); color: #9a3412; padding: 2px 8px; border-radius: 8px; font-weight: 700; }
  .route { color: var(--muted); font-size: 0.84rem; word-break: break-word; }
  @media (max-width: 720px) {
    .results-shell { grid-template-columns: 1fr; }
    .map-panel { position: static; }
    #map { height: 380px; }
    .result-header, .group-head { align-items: flex-start; flex-direction: column; }
    table, thead, tbody, tr, th, td { display: block; width: 100%; }
    thead { display: none; }
    td { padding: 8px 12px; }
    td::before { display: inline-block; width: 72px; color: var(--muted); font-weight: 700; }
    td:nth-child(1)::before { content: "駅名"; }
    td:nth-child(2)::before { content: "時間"; }
    td:nth-child(3)::before { content: "乗換"; }
    td:nth-child(4)::before { content: "経路"; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>駅到達圏検索</h1>
  <div class="form-card">
    <div class="form-row">
      <div class="form-group input-wrap">
        <label for="target">終着駅</label>
        <input type="text" id="target" placeholder="例: 渋谷" autocomplete="off">
        <div id="suggestions"></div>
      </div>
      <div class="form-group">
        <label for="time">最大時間（分）</label>
        <input type="number" id="time" value="30" min="1" max="180">
      </div>
      <div class="form-group">
        <label for="transfers">乗換回数</label>
        <select id="transfers">
          <option value="">制限なし</option>
          <option value="0">0回</option>
          <option value="1">1回まで</option>
          <option value="2">2回まで</option>
          <option value="3">3回まで</option>
        </select>
      </div>
      <div class="form-group">
        <label for="service">種別</label>
        <select id="service">
          <option value="all">通常（新幹線除外）</option>
          <option value="all_shinkansen">すべて（新幹線含む）</option>
          <option value="local">普通のみ</option>
          <option value="express">優等のみ（急行・快速・特急など）</option>
        </select>
      </div>
      <button onclick="doSearch()">検索</button>
    </div>
    <p class="meta-note" style="margin-top: 12px;">
      `通常` は新幹線を除いた検索です。`優等のみ` は `急行 / 快速 / 特急 / 快特 / 通勤急行` をまとめて検索します。
      その路線に優等データが未登録なら結果には出ません。
    </p>
  </div>
  <div id="results"><p class="info">終着駅と条件を入れて検索してください</p></div>
</div>
<script>
let mapInstance = null;
let markerLayer = null;

const stations = {{ stations | tojson }};
const input = document.getElementById('target');
const sugBox = document.getElementById('suggestions');

input.addEventListener('input', () => {
  const value = input.value.trim();
  sugBox.innerHTML = '';
  if (!value) return;
  const hits = stations.filter(name => name.includes(value)).slice(0, 15);
  hits.forEach(name => {
    const item = document.createElement('div');
    item.textContent = name;
    item.onclick = () => {
      input.value = name;
      sugBox.innerHTML = '';
    };
    sugBox.appendChild(item);
  });
});

document.addEventListener('click', event => {
  if (!event.target.closest('.input-wrap')) sugBox.innerHTML = '';
});

input.addEventListener('keydown', event => {
  if (event.key === 'Enter') doSearch();
});

async function doSearch() {
  const target = document.getElementById('target').value.trim();
  const time = document.getElementById('time').value;
  const transfers = document.getElementById('transfers').value;
  const service = document.getElementById('service').value;
  if (!target) return;

  const resultArea = document.getElementById('results');
  resultArea.innerHTML = '<p class="loading">検索中...</p>';

  const params = new URLSearchParams({ target, time });
  if (transfers !== '') params.set('transfers', transfers);
  if (service !== 'all') params.set('service', service);

  const response = await fetch('/search?' + params.toString());
  const data = await response.json();

  if (data.error) {
    resultArea.innerHTML = '<p class="error">' + data.error + '</p>';
    return;
  }

  const transferLabel = transfers === '' ? '制限なし' : (transfers + '回まで');
  const serviceLabel =
    service === 'all' ? '通常（新幹線除外）'
    : service === 'all_shinkansen' ? 'すべて（新幹線含む）'
    : service === 'local' ? '普通のみ'
    : '優等のみ（急行・快速・特急など）';
  let html = '<div class="result-card"><div class="result-header">' +
    '<h2>' + data.target + ' へ ' + time + '分以内</h2>' +
    '<span class="count">' + data.count + '駅</span></div>' +
    '<p class="meta-note">種別: ' + serviceLabel + ' / 乗換: ' + transferLabel + '</p>' +
    '<div class="results-shell"><div class="result-main">';

  if (data.count === 0) {
    html += '<p class="info">条件に合う駅はありませんでした</p></div>' +
      '<div class="map-panel"><h3>マップ</h3><div id="map"></div>' +
      '<div class="map-legend">' +
      '<span class="legend-item"><span class="legend-dot" style="background:#16a34a"></span>10分以内</span>' +
      '<span class="legend-item"><span class="legend-dot" style="background:#2563eb"></span>20分以内</span>' +
      '<span class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>30分以内</span>' +
      '<span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>30分超</span>' +
      '</div><p class="map-note">座標付きの駅があるとここに表示されます。描画対象: ' + ((data.results || []).filter(item => item.lat != null && item.lng != null).length) + '駅</p></div></div></div>';
    resultArea.innerHTML = html;
    renderMap(data);
    return;
  }

  data.groups.forEach(group => {
    html += '<div class="group-card">';
    html += '<div class="group-head"><div class="group-title"><span>' + group.line +
      '</span><span class="service-badge">' + group.service + '</span></div>' +
      '<span class="count">' + group.count + '駅</span></div>';
    html += '<table><thead><tr><th>駅名</th><th>時間</th><th>乗換</th><th>経路</th></tr></thead><tbody>';
    group.results.forEach(item => {
      html += '<tr><td><strong>' + item.station + '</strong></td>' +
        '<td><span class="time-badge">' + item.time + '分</span></td>' +
        '<td><span class="transfer-badge">' + item.transfers + '回</span></td>' +
        '<td class="route">' + item.route + '</td></tr>';
    });
    html += '</tbody></table></div>';
  });

  html += '</div><div class="map-panel"><h3>到達駅マップ</h3><div id="map"></div>' +
    '<div class="map-legend">' +
    '<span class="legend-item"><span class="legend-dot" style="background:#16a34a"></span>10分以内</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#2563eb"></span>20分以内</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>30分以内</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>30分超</span>' +
    '</div>' +
    '<p class="map-note">終着駅を強調表示し、到達駅を所要時間ごとに色分けします。描画対象: ' + ((data.results || []).filter(item => item.lat != null && item.lng != null).length) + '駅</p></div></div></div>';
  resultArea.innerHTML = html;
  renderMap(data);
}

function markerColor(minutes) {
  if (minutes <= 10) return "#16a34a";
  if (minutes <= 20) return "#2563eb";
  if (minutes <= 30) return "#f59e0b";
  return "#ef4444";
}

function popupHtml(item) {
  return "<strong>" + item.station + "</strong><br>" +
    (item.time || 0) + "? / " + (item.transfers || 0) + "?<br>" +
    item.base_line + " [" + item.service + "]<br>" +
    item.route;
}

function renderMap(data) {
  const mapEl = document.getElementById("map");
  if (!mapEl || typeof L === "undefined") return;

  const target = data.target_coords;
  const points = (data.results || []).filter(item => item.lat != null && item.lng != null);

  if (mapInstance && mapInstance._container !== mapEl) {
    mapInstance.remove();
    mapInstance = null;
    markerLayer = null;
  }

  if (!mapInstance) {
    mapInstance = L.map(mapEl, { zoomControl: true }).setView([35.681236, 139.767125], 11);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(mapInstance);
  }

  if (markerLayer) {
    markerLayer.remove();
  }

  const features = [];

  if (target && target.lat != null && target.lng != null) {
    features.push({
      type: "Feature",
      geometry: { type: "Point", coordinates: [target.lng, target.lat] },
      properties: {
        station: data.target,
        time: 0,
        transfers: 0,
        base_line: "Target",
        service: "Target",
        route: "Target",
        isTarget: true
      }
    });
  }

  points.forEach(item => {
    features.push({
      type: "Feature",
      geometry: { type: "Point", coordinates: [item.lng, item.lat] },
      properties: {
        station: item.station,
        time: item.time,
        transfers: item.transfers,
        base_line: item.base_line,
        service: item.service,
        route: item.route,
        isTarget: false
      }
    });
  });

  markerLayer = L.geoJSON(features, {
    pointToLayer: (feature, latlng) => {
      const props = feature.properties || {};
      return L.circleMarker(latlng, {
        radius: props.isTarget ? 10 : 7,
        color: props.isTarget ? "#134e4a" : "#0f172a",
        weight: props.isTarget ? 3 : 2,
        fillColor: props.isTarget ? "#14b8a6" : markerColor(props.time || 0),
        fillOpacity: 0.95
      });
    },
    onEachFeature: (feature, layer) => {
      layer.bindPopup(popupHtml(feature.properties || {}));
    }
  }).addTo(mapInstance);

  requestAnimationFrame(() => {
    mapInstance.invalidateSize();
    const note = mapEl.parentElement ? mapEl.parentElement.querySelector(".map-note") : null;
    if (note) {
      const layerCount = markerLayer && markerLayer.getLayers ? markerLayer.getLayers().length : -1;
      const first = data.results && data.results.length ? data.results[0] : null;
      const targetDebug = data.target_coords ? ("target=(" + data.target_coords.lat + "," + data.target_coords.lng + ")") : "target=null";
      const firstDebug = first ? ("first=" + first.station + " lat=" + first.lat + " lng=" + first.lng) : "first=null";
      note.textContent = "debug coords=" + points.length + " features=" + features.length + " layers=" + layerCount + " " + targetDebug + " " + firstDebug;
    }
    if (features.length === 0) {
      mapInstance.setView([35.681236, 139.767125], 11);
      return;
    }
    const bounds = markerLayer.getBounds();
    if (!bounds.isValid()) {
      mapInstance.setView([35.681236, 139.767125], 11);
      return;
    }
    if (features.length === 1) {
      mapInstance.setView(bounds.getCenter(), 14);
      return;
    }
    mapInstance.fitBounds(bounds, { padding: [24, 24], maxZoom: 15 });
  });
}
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
